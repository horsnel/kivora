<header class="site-header">
  <div class="header-inner">
    <a class="site-logo" href="{{ .Site.BaseURL }}">Menshly<span>Global</span></a>
    <div class="header-date">{{ now.Format "January 2, 2006" }}</div>
    <div class="header-actions">
      <a href="{{ "index.xml" | absURL }}" class="rss-icon" aria-label="RSS Feed" title="Subscribe to RSS Feed">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 11a9 9 0 019 9"/><path d="M4 4a16 16 0 0116 16"/><circle cx="5" cy="19" r="1"/></svg>
      </a>
      <button class="search-toggle" id="search-toggle" aria-label="Search" title="Search Articles">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <button class="mobile-toggle" id="menu-toggle" aria-label="Menu">&#9776;</button>
    </div>
  </div>
</header>
