<div class="sidebar-widget ai-analysis-widget" id="aiAnalysisWidget">
  <div class="ai-header">
    <h3>&#129302; AI Market Intelligence</h3>
  </div>

  <div class="ai-tier-content" id="aiFreeContent">
    <div class="ai-loading">Scanning headlines...</div>
    <div class="ai-free-results" id="aiFreeResults" style="display:none;">
      <div class="ai-risk-pulse">
        <span class="ai-risk-label">&#9889; Risk Pulse</span>
        <span class="ai-risk-score" id="aiRiskScore">--/100</span>
        <div class="ai-risk-bar"><div class="ai-risk-fill" id="aiRiskFill"></div></div>

      <div class="ai-forex-pairs" id="aiForexPairs"></div>
      <div class="ai-drivers">
        <span class="ai-section-title">&#128161; Key Drivers</span>

      </div>
      <div class="ai-watchlist">
        <span class="ai-section-title">&#128197; Events Watch</span>
        <ul id="aiWatchlist"></ul>
      </div>
    </div>
  </div>

  <div class="ai-footer">
    <span class="ai-timestamp" id="aiTimestamp">--</span>
    <button class="ai-refresh-btn" id="aiRefreshBtn">&#8635; Refresh</button>
  </div>
</div>
