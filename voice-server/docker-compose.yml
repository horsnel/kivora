# =============================================================================
# Kivora Voice Server - Docker Compose Configuration
# =============================================================================
# Usage:
#   Lightweight (free tier):   docker compose up -d
#   Full (all services):       docker compose --profile full up -d
#   GPU (production):          docker compose --profile gpu up -d
#
# Manage:
#   docker compose [start|stop|restart|down]
#   docker compose logs -f
# =============================================================================

services:
  # ── Lightweight: 3 core services (Edge TTS + Whisper + Argos) ──
  kivora-voice:
    build:
      context: .
      dockerfile: Dockerfile.light
    container_name: kivora-voice-server
    ports:
      - "${PORT:-3900}:3900"
    volumes:
      - kivora-voice-data:/data
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - PORT=3900
      - OMNIVOICE_DATA_DIR=/data
      - OMNIVOICE_API_KEY=${OMNIVOICE_API_KEY:-}
      - OMNIVOICE_CORS_ORIGINS=${OMNIVOICE_CORS_ORIGINS:-*}
      - OMNIVOICE_WHISPER_MODEL=${OMNIVOICE_WHISPER_MODEL:-base}
      - OMNIVOICE_WHISPER_DEVICE=cpu
      - OMNIVOICE_LOG_LEVEL=${OMNIVOICE_LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3900/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - kivora-voice
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ── Full: All 10 services (needs 4GB+ RAM) ──
  kivora-voice-full:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kivora-voice-server-full
    profiles:
      - full
    ports:
      - "${PORT:-3900}:3900"
    volumes:
      - kivora-voice-data:/data
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - PORT=3900
      - OMNIVOICE_DATA_DIR=/data
      - OMNIVOICE_API_KEY=${OMNIVOICE_API_KEY:-}
      - OMNIVOICE_CORS_ORIGINS=${OMNIVOICE_CORS_ORIGINS:-*}
      - OMNIVOICE_WHISPER_MODEL=${OMNIVOICE_WHISPER_MODEL:-base}
      - OMNIVOICE_WHISPER_DEVICE=cpu
      - OMNIVOICE_LOG_LEVEL=${OMNIVOICE_LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3900/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    networks:
      - kivora-voice
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ── GPU: All services with NVIDIA GPU acceleration ──
  kivora-voice-gpu:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kivora-voice-server-gpu
    profiles:
      - gpu
    ports:
      - "${PORT:-3900}:3900"
    volumes:
      - kivora-voice-data:/data
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
      - PORT=3900
      - OMNIVOICE_DATA_DIR=/data
      - OMNIVOICE_API_KEY=${OMNIVOICE_API_KEY:-}
      - OMNIVOICE_CORS_ORIGINS=${OMNIVOICE_CORS_ORIGINS:-*}
      - OMNIVOICE_WHISPER_MODEL=${OMNIVOICE_WHISPER_MODEL:-base}
      - OMNIVOICE_WHISPER_DEVICE=cuda
      - OMNIVOICE_LOG_LEVEL=${OMNIVOICE_LOG_LEVEL:-info}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3900/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    restart: unless-stopped
    networks:
      - kivora-voice
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  kivora-voice-data:
    name: kivora-voice-data
    driver: local

networks:
  kivora-voice:
    name: kivora-voice
    driver: bridge
