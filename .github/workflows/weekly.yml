name: Weekly Platform Maintenance

on:
  schedule:
    - cron: '0 0 * * 0'   # Every Sunday midnight UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  maintain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @supabase/supabase-js groq-sdk

      - name: Update exchange rates
        run: node --experimental-vm-modules scripts/update-rates.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Run wiki lint pass
        run: node --experimental-vm-modules scripts/wiki-lint.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
