name = "kivora-research"
main = "src/index.js"
compatibility_date = "2026-04-27"
compatibility_flags = ["nodejs_compat"]

# Workers AI binding — gives us free LLM access directly in the Worker
[ai]
binding = "AI"

# Secret bindings (set via `wrangler secret put`):
# OPENROUTER_API_KEY — for OpenRouter LLM calls
# TAVILY_API_KEY — for Tavily web search
# GEMINI_API_KEY — for Gemini LLM calls
# BRAVE_SEARCH_API_KEY — for Brave Search (deep mode)
# FIRECRAWL_API_KEY — for Firecrawl search & scraping

[vars]
ENVIRONMENT = "production"
