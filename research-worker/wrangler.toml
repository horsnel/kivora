name = "kivora-research"
main = "src/index.js"
compatibility_date = "2026-04-27"
compatibility_flags = ["nodejs_compat"]

# Workers AI binding — gives us free LLM access directly in the Worker
[ai]
binding = "AI"

# ── Cron trigger for credit resets ──
# Cloudflare's free plan limits accounts to 5 cron triggers total, and this
# account is already at 5 (musicpulse-api × 2, sigma-pipeline × 2,
# vaultdrop-worker × 1). To stay under the limit, the daily/monthly credit
# resets are invoked via the HTTP endpoints:
#   GET https://kivora-research.odehebuka48.workers.dev/cron/daily-reset?key=<CRON_SECRET>
#   GET https://kivora-research.odehebuka48.workers.dev/cron/monthly-reset?key=<CRON_SECRET>
# Configure an external scheduler (e.g. cron-job.org, EasyCron, GitHub Actions)
# to hit the daily-reset URL every day at 00:00 UTC and the monthly-reset URL
# on the 1st of each month at 00:05 UTC.
# To re-enable the native CF cron later, uncomment the [triggers] block below
# after deleting a cron trigger from another worker in this account.
#
# [triggers]
# crons = ["0 0 * * *"]

# Secret bindings (set via `wrangler secret put`):
# OPENROUTER_API_KEY — for OpenRouter LLM calls
# TAVILY_API_KEY — for Tavily web search
# GEMINI_API_KEY — for Gemini LLM calls
# MISTRAL_API_KEY — for Mistral Pixtral vision (image descriptions)
# BRAVE_SEARCH_API_KEY — for Brave Search (deep mode)
# FIRECRAWL_API_KEY — for Firecrawl search & scraping
# SUPABASE_URL — same as NEXT_PUBLIC_SUPABASE_URL (https://asfzdbpfakwpiawhhrby.supabase.co)
# SUPABASE_SERVICE_ROLE_KEY — service role key for RPC calls (reset_daily_credits, etc.)
# CRON_SECRET — optional shared secret to protect /cron/daily-reset and /cron/monthly-reset HTTP endpoints

[vars]
ENVIRONMENT = "production"
