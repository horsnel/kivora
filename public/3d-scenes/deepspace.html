<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <title>Deep Space</title>
    <style>
        html, body {
            margin: 0 !important; padding: 0 !important; width: 100% !important; height: 100% !important;
            overflow: hidden !important; background: #000000 !important; color: #ffffff;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; -webkit-text-size-adjust: 100%;
        }
        #canvas-container { position: fixed !important; top: 0 !important; left: 0 !important; width: 100% !important; height: 100% !important; z-index: 1; }
        canvas { display: block; width: 100%; height: 100%; }
        .ui-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .header { position: absolute; top: 30px; left: 50%; transform: translateX(-50%); text-align: center; animation: fadeInDown 2s ease-out; width: 90%; }
        .header h1 { font-size: 2rem; font-weight: 300; letter-spacing: 0.5em; text-transform: uppercase; color: rgba(255,255,255,0.85); text-shadow: 0 0 30px rgba(200,150,255,0.4), 0 0 60px rgba(100,50,200,0.2); margin: 0; }
        .header .subtitle { font-size: 0.75rem; font-weight: 300; letter-spacing: 0.3em; color: rgba(200,180,255,0.5); margin-top: 10px; }
        .telemetry { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); display: flex; gap: 40px; align-items: center; animation: fadeInUp 2s ease-out 0.5s both; flex-wrap: wrap; justify-content: center; width: 90%; }
        .tel-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tel-label { font-size: 0.6rem; letter-spacing: 0.2em; color: rgba(255,255,255,0.3); text-transform: uppercase; }
        .tel-value { font-size: 0.85rem; letter-spacing: 0.05em; color: rgba(255,255,255,0.7); font-variant-numeric: tabular-nums; }
        .controls-hint { position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%); text-align: center; animation: fadeInUp 2s ease-out 0.3s both; }
        .controls-hint p { font-size: 0.7rem; color: rgba(255,255,255,0.25); letter-spacing: 0.15em; margin: 0; }
        .vignette { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%); }
        .grain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 6; opacity: 0.04; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); background-size: 200px 200px; }
        .loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: opacity 1s ease-out, visibility 1s ease-out; }
        .loading-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .loading-text { font-size: 0.9rem; letter-spacing: 0.3em; color: rgba(255,255,255,0.6); margin-bottom: 30px; }
        .loading-bar-container { width: 200px; height: 2px; background: rgba(255,255,255,0.15); position: relative; overflow: hidden; border-radius: 1px; }
        .loading-bar { height: 100%; width: 0%; background: linear-gradient(90deg, rgba(200,200,255,0.4), rgba(200,200,255,0.9)); transition: width 0.3s ease-out; }
        .loading-percent { margin-top: 15px; font-size: 0.75rem; color: rgba(255,255,255,0.4); letter-spacing: 0.2em; }
        @keyframes fadeInDown { from { opacity: 0; transform: translateX(-50%) translateY(-20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        @media (max-width: 600px) {
            .header { top: 20px; } .header h1 { font-size: 1.4rem; letter-spacing: 0.3em; }
            .telemetry { gap: 20px; bottom: 20px; } .controls-hint { bottom: 110px; }
        }
    </style>
</head>
<body>
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-text">LOADING</div>
        <div class="loading-bar-container"><div class="loading-bar" id="loadingBar"></div></div>
        <div class="loading-percent" id="loadingPercent">0%</div>
    </div>
    <div id="canvas-container"></div>
    <div class="vignette"></div>
    <div class="grain"></div>
    <div class="ui-overlay">
        <div class="header">
            <h1>Deep Space</h1>
            <div class="subtitle">Hubble Space Telescope &middot; ESA/Hubble</div>
        </div>
        <div class="controls-hint"><p>MOVE TO EXPLORE &middot; SCROLL FOR SPEED</p></div>
        <div class="telemetry">
            <div class="tel-item"><div class="tel-label">Object</div><div class="tel-value">Westerlund 2</div></div>
            <div class="tel-item"><div class="tel-label">Distance</div><div class="tel-value">20,000 ly</div></div>
            <div class="tel-item"><div class="tel-label">Instrument</div><div class="tel-value">WFC3 / ACS</div></div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
    (function() {
        'use strict';
        document.documentElement.style.background = '#000000';
        document.body.style.background = '#000000'; document.body.style.color = '#ffffff';
        document.body.style.margin = '0'; document.body.style.padding = '0'; document.body.style.overflow = 'hidden';
        if (typeof THREE === 'undefined') { document.body.innerHTML = '<div style="color:white;text-align:center;padding-top:40vh;font-family:sans-serif;">Error: Three.js not loaded</div>'; return; }

        var container = document.getElementById('canvas-container');
        var loadingScreen = document.getElementById('loadingScreen');
        var loadingBar = document.getElementById('loadingBar');
        var loadingPercent = document.getElementById('loadingPercent');
        var loadedCount = 0; var totalTextures = 3;
        function updateLoading() {
            loadedCount++;
            var pct = Math.round((loadedCount / totalTextures) * 100);
            loadingBar.style.width = pct + '%'; loadingPercent.textContent = pct + '%';
            if (pct >= 100) setTimeout(function() { loadingScreen.classList.add('hidden'); }, 500);
        }
        setTimeout(function() { loadingBar.style.width = '100%'; loadingPercent.textContent = '100%'; setTimeout(function() { loadingScreen.classList.add('hidden'); }, 300); }, 6000);

        var scene = new THREE.Scene(); scene.background = new THREE.Color(0x000000);
        scene.fog = new THREE.FogExp2(0x000000, 0.003);
        var camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1, 12);
        var renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: 'high-performance' });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping; renderer.toneMappingExposure = 1.4;
        renderer.outputEncoding = THREE.sRGBEncoding; container.appendChild(renderer.domElement);

        var textureLoader = new THREE.TextureLoader(); textureLoader.crossOrigin = 'anonymous';
        var NEBULA_URLS = [
            'https://cdn.esahubble.org/archives/images/screen/heic1509a.jpg',
            'https://cdn.esahubble.org/archives/images/screen/heic0910h.jpg',
            'https://cdn.esahubble.org/archives/images/screen/heic0109a.jpg'
        ];

        var nebulaPlanes = []; var nebulaMaterials = [];
        function createNebulaPlane(url, z, scale, opacity, rotation) {
            var geo = new THREE.PlaneGeometry(scale, scale, 1, 1);
            var mat = new THREE.MeshBasicMaterial({ transparent: true, opacity: 0, side: THREE.DoubleSide, depthWrite: false, blending: THREE.AdditiveBlending });
            var mesh = new THREE.Mesh(geo, mat); mesh.position.z = z; mesh.rotation.z = rotation || 0;
            scene.add(mesh); nebulaPlanes.push(mesh); nebulaMaterials.push(mat);
            textureLoader.load(url, function(tex) {
                tex.encoding = THREE.sRGBEncoding; tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
                mat.map = tex; mat.opacity = opacity; mat.needsUpdate = true; updateLoading();
            }, undefined, function() { updateLoading(); });
            return mesh;
        }
        createNebulaPlane(NEBULA_URLS[0], -25, 35, 0.55, 0.1);
        createNebulaPlane(NEBULA_URLS[1], -15, 28, 0.45, -0.3);
        createNebulaPlane(NEBULA_URLS[2], -8, 22, 0.35, 0.2);

        function createProceduralNebula() {
            var canvas = document.createElement('canvas'); canvas.width = 1024; canvas.height = 1024;
            var ctx = canvas.getContext('2d');
            ctx.fillStyle = '#000000'; ctx.fillRect(0, 0, 1024, 1024);
            var grad = ctx.createRadialGradient(512, 512, 0, 512, 512, 600);
            grad.addColorStop(0, 'rgba(80,40,120,0.4)'); grad.addColorStop(0.3, 'rgba(60,30,90,0.25)');
            grad.addColorStop(0.6, 'rgba(40,20,60,0.12)'); grad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, 1024, 1024);
            var grad2 = ctx.createRadialGradient(300, 400, 0, 300, 400, 400);
            grad2.addColorStop(0, 'rgba(120,60,30,0.2)'); grad2.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = grad2; ctx.fillRect(0, 0, 1024, 1024);
            for (var i = 0; i < 200; i++) {
                var x = Math.random() * 1024, y = Math.random() * 1024, r = Math.random() * 2 + 0.5;
                var b = Math.floor(Math.random() * 100 + 155);
                ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(' + b + ',' + b + ',255,' + (Math.random() * 0.6 + 0.2) + ')'; ctx.fill();
            }
            var tex = new THREE.CanvasTexture(canvas); tex.encoding = THREE.sRGBEncoding; return tex;
        }
        var fallbackGeo = new THREE.PlaneGeometry(60, 60, 1, 1);
        var fallbackMat = new THREE.MeshBasicMaterial({ map: createProceduralNebula(), transparent: true, opacity: 0.3, side: THREE.DoubleSide, depthWrite: false, blending: THREE.AdditiveBlending });
        var fallbackPlane = new THREE.Mesh(fallbackGeo, fallbackMat); fallbackPlane.position.z = -35; scene.add(fallbackPlane);

        var dustCount = 2000; var dustPos = new Float32Array(dustCount * 3); var dustSizes = new Float32Array(dustCount);
        for (var i = 0; i < dustCount; i++) {
            var i3 = i * 3; dustPos[i3] = (Math.random() - 0.5) * 50;
            dustPos[i3+1] = (Math.random() - 0.5) * 50; dustPos[i3+2] = (Math.random() - 0.5) * 30 + 5;
            dustSizes[i] = Math.random() * 2 + 0.5;
        }
        var dustGeo = new THREE.BufferGeometry();
        dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
        dustGeo.setAttribute('size', new THREE.BufferAttribute(dustSizes, 1));
        var dustMat = new THREE.PointsMaterial({ size: 0.12, color: 0xaaaaff, transparent: true, opacity: 0.35, depthWrite: false, blending: THREE.AdditiveBlending, sizeAttenuation: true });
        var dust = new THREE.Points(dustGeo, dustMat); scene.add(dust);

        function createStarField(count, radiusMin, radiusMax, size, opacity) {
            var pos = new Float32Array(count * 3); var cols = new Float32Array(count * 3);
            for (var i = 0; i < count; i++) {
                var i3 = i * 3; var r = radiusMin + Math.random() * (radiusMax - radiusMin);
                var theta = Math.random() * Math.PI * 2; var phi = Math.acos(2 * Math.random() - 1);
                pos[i3] = r * Math.sin(phi) * Math.cos(theta); pos[i3+1] = r * Math.sin(phi) * Math.sin(theta); pos[i3+2] = r * Math.cos(phi);
                var t = Math.random();
                if (t > 0.96) { cols[i3]=0.70; cols[i3+1]=0.78; cols[i3+2]=1.0; }
                else if (t > 0.90) { cols[i3]=1.0; cols[i3+1]=0.90; cols[i3+2]=0.70; }
                else if (t > 0.85) { cols[i3]=1.0; cols[i3+1]=0.70; cols[i3+2]=0.55; }
                else { cols[i3]=1.0; cols[i3+1]=1.0; cols[i3+2]=1.0; }
            }
            var geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(cols, 3));
            var mat = new THREE.PointsMaterial({ size: size, sizeAttenuation: true, vertexColors: true, transparent: true, opacity: opacity, depthWrite: false, blending: THREE.AdditiveBlending });
            return new THREE.Points(geo, mat);
        }
        var distantStars = createStarField(6000, 20, 80, 0.5, 0.65); scene.add(distantStars);
        var brightStars = createStarField(150, 15, 60, 1.0, 0.85); scene.add(brightStars);

        scene.add(new THREE.AmbientLight(0x111122, 0.2));
        var warmLight = new THREE.PointLight(0xff8844, 0.8, 40); warmLight.position.set(5, 3, -10); scene.add(warmLight);
        var coolLight = new THREE.PointLight(0x4488ff, 0.5, 40); coolLight.position.set(-5, -2, -15); scene.add(coolLight);

        var mouseX = 0, mouseY = 0, targetYaw = 0, targetPitch = 0, camYaw = 0, camPitch = 0.1, scrollSpeed = 1.0;
        document.addEventListener('mousemove', function(e) { mouseX = (e.clientX / window.innerWidth) * 2 - 1; mouseY = (e.clientY / window.innerHeight) * 2 - 1; });
        document.addEventListener('touchmove', function(e) { if (e.touches.length > 0) { mouseX = (e.touches[0].clientX / window.innerWidth) * 2 - 1; mouseY = (e.touches[0].clientY / window.innerHeight) * 2 - 1; } }, { passive: true });
        document.addEventListener('wheel', function(e) { scrollSpeed += e.deltaY * -0.001; scrollSpeed = Math.max(0.3, Math.min(2.5, scrollSpeed)); }, { passive: true });

        var clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate); var t = clock.getElapsedTime();
            targetYaw = mouseX * 0.8; targetPitch = 0.1 + mouseY * 0.5;
            camYaw += (targetYaw - camYaw) * 0.03; camPitch += (targetPitch - camPitch) * 0.03;
            var orbitSpeed = 0.04 * scrollSpeed; var baseAngle = t * orbitSpeed;
            var camRadius = 10 + Math.sin(t * 0.08) * 2; var camHeight = Math.sin(camPitch) * 3; var horizontalR = Math.cos(camPitch) * camRadius;
            camera.position.x = Math.sin(baseAngle + camYaw) * horizontalR;
            camera.position.z = Math.cos(baseAngle + camYaw) * horizontalR;
            camera.position.y = camHeight + Math.sin(t * 0.15) * 0.3;
            camera.lookAt(0, 0, -15);
            nebulaPlanes.forEach(function(plane, i) {
                plane.position.x = Math.sin(t * 0.02 + i * 2) * 1.5;
                plane.position.y = Math.cos(t * 0.015 + i * 1.5) * 0.8;
                plane.rotation.z += 0.0002 * (i % 2 === 0 ? 1 : -1);
            });
            fallbackPlane.rotation.z = t * 0.005;
            distantStars.rotation.y = t * 0.003; brightStars.rotation.y = t * 0.002;
            var dPos = dustGeo.attributes.position.array;
            for (var i = 0; i < dustCount; i++) {
                var i3 = i * 3;
                dPos[i3] += Math.sin(t * 0.1 + i) * 0.001 * scrollSpeed;
                dPos[i3+1] += Math.cos(t * 0.08 + i * 0.5) * 0.0008 * scrollSpeed;
            }
            dustGeo.attributes.position.needsUpdate = true;
            warmLight.intensity = 0.6 + Math.sin(t * 1.5) * 0.3;
            coolLight.intensity = 0.4 + Math.cos(t * 2.0) * 0.2;
            renderer.render(scene, camera);
        }
        renderer.render(scene, camera); animate();
        window.addEventListener('resize', function() {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        });
    })();
    </script>
</body>
</html>
